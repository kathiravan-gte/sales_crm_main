<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CRM Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md">

        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-slate-900 rounded-xl mb-4 shadow-lg">
                <i class="fas fa-chart-line text-white text-lg"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800">CRM Platform</h1>
            <p class="text-sm text-slate-500 mt-1">Create your account</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">

            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-5 text-sm flex items-center gap-2">
                <i class="fas fa-exclamation-circle text-red-400 flex-shrink-0"></i>
                {{ error }}
            </div>
            {% endif %}

            <form action="/signup" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1.5" for="email">Email</label>
                    <input class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 placeholder-slate-300 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all"
                           id="email" type="email" name="email" required placeholder="you@company.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1.5" for="password">Password</label>
                    <input class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 placeholder-slate-300 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all"
                           id="password" type="password" name="password" required placeholder="Choose a strong password">
                </div>
                <button class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-4 rounded-xl transition-all shadow-lg shadow-emerald-500/20 flex items-center justify-center gap-2" type="submit">
                    <i class="fas fa-user-plus text-sm"></i>
                    Create Account
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-500">
                Already have an account? <a href="/login" class="text-blue-600 hover:text-blue-700 font-semibold">Sign in</a>
            </p>
        </div>

        <p class="text-center text-xs text-slate-400 mt-6">
            &copy; 2025 CRM Platform. All rights reserved.
        </p>
    </div>
</body>
</html>
